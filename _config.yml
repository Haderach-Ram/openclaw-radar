theme: jekyll-theme-chirpy
lang: en
timezone: Asia/Calcutta

title: draCuLAW
radar_name: the OpenClaw Radar
tagline: Daily intelligence on OpenClaw and the AI agent ecosystem
description: >-
  Automated daily digest tracking OpenClaw, hermesagent, ZeroClaw, IronClaw —
  issues, PRs, releases, community signals.

url: "https://haderach-ram.github.io"
baseurl: "/openclaw-radar"

github:
  username: Haderach-Ram

social:
  name: Haderach-Ram
  email: ""
  links:
    - https://github.com/Haderach-Ram

theme_mode: dark

avatar: "/assets/img/avatar.png"

toc: true
comments:
  provider: giscus
  giscus:
    repo: Haderach-Ram/openclaw-radar
    repo_id: R_kgDOSZZ1JQ
    category: General
    category_id: DIC_kwDOSZZ1Jc4C8trM
    mapping: pathname
    input_position: bottom
    lang: en
    reactions_enabled: 1

paginate: 10

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      pin: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-archives

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

analytics:
  goatcounter:
    id: openclaw-radar
